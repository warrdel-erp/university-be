name: Deploy Backend to AWS EC2 using Docker

on:
  push:
    branches:
      - production # Change to your deployment branch

# No build environment needed - using single .env file

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: university-erp-be:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image
        run: docker save university-erp-be:latest | gzip > university-erp-be.tar.gz

      - name: Copy Docker image to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "university-erp-be.tar.gz"
          target: "/home/${{ secrets.SSH_USER }}"

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Load the Docker image
            docker load < /home/${{ secrets.SSH_USER }}/university-erp-be.tar.gz

            # Stop and remove existing container if it exists
            docker stop university-erp-be || true
            docker rm university-erp-be || true

            # Run the new container
            docker run -d \
              --name university-erp-be \
              --restart unless-stopped \
              -p 6002:6002 \
              university-erp-be:latest

            # Clean up old images and tar file
            docker image prune -f
            rm -f /home/${{ secrets.SSH_USER }}/university-erp-be.tar.gz
